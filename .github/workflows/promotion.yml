name: Promotion

# Weekly automated Stable cut: every Thursday it (1) verifies nightly is green —
# builds, lints, and tests the Swift app, and format/lint/builds the website — and
# only if everything passes does it (2) open a `nightly → main` PR (the changelog
# record) and (3) run `.github/scripts/promote.sh`, which sets `main` to nightly's
# tree, pushes, and closes that PR. The push to `main` triggers ci.yml's release job
# (builds + publishes the Stable DMG + bumps the cask; the website has no release
# cycle). No human step — and a red build/test never reaches Stable, because the
# promote job needs both verify jobs.
#
# Why a script and not the merge button: main and nightly don't share recent
# history (each promotion adds a main-only squash commit), so the button's 3-way
# merge conflicts every time — see promote.sh. The script avoids the merge entirely.
#
# REQUIRES the PROMOTION_TOKEN secret — a fine-grained PAT with Contents: R/W,
# Pull requests: R/W, and Workflows: R/W. It must be a PAT (not the default
# GITHUB_TOKEN): a push made with GITHUB_TOKEN does NOT trigger ci.yml, so the
# release would never build; and a promotion can change files under
# .github/workflows, which needs the Workflows scope.
#
# Cron is UTC and can be delayed under heavy GitHub load, so workflow_dispatch is
# also available for catch-up + manual runs. Scheduled triggers only fire from the
# workflow file on the DEFAULT branch (main), so this takes effect once it lands
# on main (via the first promotion after merge).
on:
  schedule:
    # Thursday 14:00 PKT = 09:00 UTC. PKT is UTC+5 with no DST, so this is fixed
    # year-round and the user's local "2 PM Thursday" never drifts.
    - cron: "0 9 * * 4"
  workflow_dispatch:

# Read-only by default — only the promote job gets the write scope it needs.
permissions:
  contents: read

# Two of these must never race — overlapping runs would fight over the same
# PR body. Queue rather than cancel so a manual dispatch during the cron
# window doesn't drop work.
concurrency:
  group: promotion
  cancel-in-progress: false

jobs:
  # Cheap gate: is there anything to promote, and is the release token present?
  # Skips the expensive verify/promote jobs on idle weeks, and fails fast (before
  # spending a macOS runner) if PROMOTION_TOKEN is missing when it's actually needed.
  check:
    name: Anything to promote?
    runs-on: ubuntu-latest
    # Forks have no `nightly`/`main` pair worth promoting and the auto token
    # can't write to the upstream repo anyway.
    if: github.repository == 'rafay99-epic/porter'
    permissions:
      contents: read
    outputs:
      promote: ${{ steps.diff.outputs.promote }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          ref: nightly
      # Compare main's CONTENT to nightly's. A tree diff is the correct "is there a
      # real change" signal: nightly's commits never land on main (each promotion is
      # a main-only squash), so commits-ahead stays > 0 even when the trees match —
      # diffing the trees avoids opening an orphan PR on an idle week.
      - name: Diff main vs nightly
        id: diff
        run: |
          git fetch --quiet origin \
            "+refs/heads/main:refs/remotes/origin/main" \
            "+refs/heads/nightly:refs/remotes/origin/nightly"
          if git diff --quiet refs/remotes/origin/main refs/remotes/origin/nightly; then
            echo "main already equals nightly — nothing to promote."
            echo "promote=false" >> "$GITHUB_OUTPUT"
          else
            echo "promote=true" >> "$GITHUB_OUTPUT"
          fi
      # Only matters when we're actually going to promote — don't redly fail an
      # idle week for a missing secret.
      - name: Require PROMOTION_TOKEN
        if: steps.diff.outputs.promote == 'true'
        env:
          TOK: ${{ secrets.PROMOTION_TOKEN }}
        run: |
          if [ -z "${TOK:-}" ]; then
            echo "::error::Auto-promotion needs the PROMOTION_TOKEN secret — a fine-grained PAT with Contents: R/W, Pull requests: R/W, and Workflows: R/W. It must be a PAT (not GITHUB_TOKEN): a GITHUB_TOKEN push to main does NOT trigger ci.yml's release, and a promotion may change .github/workflows files."
            exit 1
          fi

  # The gate that protects Stable: build + test + lint the Swift app on nightly's
  # tip. If any step fails, this job fails, `promote` (which needs it) is skipped,
  # and nothing reaches main. Mirrors ci.yml's checks.
  verify:
    name: Verify nightly (build · test · lint)
    needs: check
    if: needs.check.outputs.promote == 'true'
    runs-on: macos-26
    permissions:
      contents: read
    defaults:
      run:
        working-directory: apps/desktop
    steps:
      - uses: actions/checkout@v7
        with:
          ref: nightly
      - name: Swift build (release config)
        run: swift build -c release
      - name: Swift tests
        run: swift test
      - name: SwiftLint
        run: |
          brew install swiftlint
          swiftlint --reporter github-actions-logging

  # The website rides along to main in the promoted tree, so verify it's healthy
  # too — format, type-check, and build. There's no website release; this is a
  # pure gate. Cheap (ubuntu + bun), so it always runs on a promotion. Mirrors
  # website.yml.
  verify-web:
    name: Verify website (format · lint · build)
    needs: check
    if: needs.check.outputs.promote == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v7
        with:
          ref: nightly
      - name: Install bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"
      # Install the whole workspace from the repo root so bun resolves it against
      # the committed bun.lock; --frozen-lockfile fails if the lockfile is stale.
      - name: Install dependencies
        working-directory: .
        run: bun install --frozen-lockfile
      - name: Check formatting (Prettier)
        run: bun run format:check
      - name: Type-check (tsc)
        run: bun run lint
      - name: Build (Vite)
        run: bun run build

  # Only runs if check said "promote" AND both the desktop and website verifies
  # passed. Opens the changelog PR, then promotes (sets main to nightly, pushes →
  # triggers the release, closes PR).
  promote:
    name: Promote nightly → main (cut Stable)
    needs: [check, verify, verify-web]
    if: needs.check.outputs.promote == 'true'
    runs-on: ubuntu-latest
    # Uses PROMOTION_TOKEN (the PAT) for everything, so the job token stays read-only.
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0 # full history — the scripts walk every commit in main..nightly
          ref: nightly # always promote nightly's tip regardless of dispatch ref
          # Persist the PAT so `git push origin main` in promote.sh is authored by
          # the PAT — which is what makes the push trigger ci.yml's release job.
          token: ${{ secrets.PROMOTION_TOKEN }}
      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
      - name: Summarize the promotion as a PR (the release's changelog record)
        env:
          GH_TOKEN: ${{ secrets.PROMOTION_TOKEN }}
        run: bash .github/scripts/promotion.sh
      - name: Promote (sets main to nightly, pushes → triggers the release, closes the PR)
        env:
          GH_TOKEN: ${{ secrets.PROMOTION_TOKEN }}
        run: bash .github/scripts/promote.sh --yes
