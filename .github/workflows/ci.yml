name: CI

# Desktop-app CI and release in one pipeline so the build users receive is the
# exact one that passed every check. Test + lint are the gate: on `main` the
# release builds + publishes only after both pass; on PRs the DMG builds + uploads
# as an artifact instead.
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "apps/desktop/**"
      - ".github/workflows/ci.yml"
  pull_request:
    paths:
      - "apps/desktop/**"
      - ".github/workflows/ci.yml"

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

defaults:
  run:
    working-directory: apps/desktop

jobs:
  test:
    name: Test (swift test)
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v7
      - name: Swift version
        run: swift --version
      - name: Run tests
        run: swift test

  lint:
    name: Quality (SwiftLint)
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v7
      - name: Install SwiftLint
        run: brew install swiftlint
      - name: Lint
        run: swiftlint --reporter github-actions-logging

  package:
    name: Build & package DMG
    if: github.event_name == 'pull_request'
    runs-on: macos-26
    needs: [test, lint]
    steps:
      - uses: actions/checkout@v7
      - name: Build app and installer
        run: |
          ./build.sh
          ./make-dmg.sh
      - name: Upload installer
        uses: actions/upload-artifact@v7
        with:
          name: Porter-dmg
          path: apps/desktop/build/Porter.dmg

  release:
    name: Build and publish release
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: macos-26
    needs: [test, lint]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0 # full history — the version is the commit count
      - name: Compute version
        run: echo "VERSION=0.$(git rev-list --count HEAD)" >> "$GITHUB_ENV"
      - name: Build app and installer
        run: |
          export PORTER_VERSION="$VERSION"
          ./build.sh
          ./make-dmg.sh
      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "v$VERSION" build/Porter.dmg \
            --title "Porter $VERSION" --generate-notes
