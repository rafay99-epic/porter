name: Nightly

# Push to `nightly` → build the Nightly channel and refresh a single rolling
# `nightly` pre-release. Test + lint gate the publish (publish `needs` them), so a
# red check never reaches testers' auto-updater. The release title MUST contain
# "build <n>" — the Nightly updater parses it to order pre-releases (the tag is
# reused, so the version string can't).
on:
  workflow_dispatch:
  push:
    branches: [nightly]
    paths:
      - "apps/desktop/**"
      - ".github/workflows/nightly.yml"

permissions:
  contents: read

concurrency:
  group: nightly-${{ github.ref }}
  cancel-in-progress: false

defaults:
  run:
    working-directory: apps/desktop

jobs:
  test:
    name: Test (swift test)
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v7
      - run: swift test

  lint:
    name: Quality (SwiftLint)
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v7
      - run: brew install swiftlint
      - run: swiftlint --reporter github-actions-logging

  release:
    name: Build & publish nightly
    runs-on: macos-26
    needs: [test, lint]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0 # version is the commit count
      - name: Compute version
        run: echo "VERSION=0.$(git rev-list --count HEAD)" >> "$GITHUB_ENV"
      - name: Build app and installer
        run: |
          export PORTER_CHANNEL=nightly
          export PORTER_VERSION="$VERSION"
          export PORTER_BUILD="${{ github.run_number }}"
          ./build.sh
          ./make-dmg.sh
      - name: Refresh rolling nightly pre-release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Reuse the single `nightly` tag/release. Delete the old assets, upload
          # the new DMG, and set a title that carries the build number the updater
          # parses ("build <n>").
          TITLE="Porter Nightly $VERSION (build ${{ github.run_number }})"
          if gh release view nightly >/dev/null 2>&1; then
            gh release upload nightly build/Porter-Nightly.dmg --clobber
            gh release edit nightly --title "$TITLE" --prerelease --latest=false
          else
            gh release create nightly build/Porter-Nightly.dmg \
              --title "$TITLE" --prerelease --notes "Rolling nightly build." --target nightly
          fi

      # Sync the version-pinned `porter-nightly` cask to the DMG just shipped. The
      # nightly tag is rolling, so the cask version is the monotonic build number
      # (matches the "build <n>" release title). Needs the TAP_TOKEN secret;
      # skips with a warning if absent so a missing secret never fails the build.
      - name: Bump Homebrew cask (nightly)
        env:
          TAP_TOKEN: ${{ secrets.TAP_TOKEN }}
        run: |
          if [ -z "${TAP_TOKEN:-}" ]; then
            echo "::warning::TAP_TOKEN not set — skipping nightly cask bump. Add a fine-grained PAT with Contents: Read & Write on rafay99-epic/homebrew-apps as the TAP_TOKEN secret to automate it."
            exit 0
          fi
          VERSION="${{ github.run_number }}" CASK=porter-nightly \
            bash "$GITHUB_WORKSPACE/.github/scripts/bump-cask.sh" "$PWD/build/Porter-Nightly.dmg"
